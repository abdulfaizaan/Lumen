version: '3.8'

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2

  app1:
    build:
      context: ./frontend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - LIVEKIT_URL=ws://livekit:7880
      - NEXT_PUBLIC_LIVEKIT_URL=ws://localhost:7880
      - LIVEKIT_API_KEY=lumen_key
      - LIVEKIT_API_SECRET=lumen_secret
    env_file:
      - ./frontend/.env.local
    depends_on:
      - redis
      - livekit

  app2:
    build:
      context: ./frontend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - LIVEKIT_URL=ws://livekit:7880
      - NEXT_PUBLIC_LIVEKIT_URL=ws://localhost:7880
      - LIVEKIT_API_KEY=lumen_key
      - LIVEKIT_API_SECRET=lumen_secret
    env_file:
      - ./frontend/.env.local
    depends_on:
      - redis
      - livekit

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  livekit:
    image: livekit/livekit-server:latest
    command: --dev --keys lumen_key:lumen_secret
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

  egress:
    image: livekit/egress:latest
    volumes:
      - ./egress.yaml:/etc/egress.yaml:ro
    command: --config /etc/egress.yaml
    depends_on:
      - livekit
      - redis
