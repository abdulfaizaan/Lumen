events {
    worker_connections 1024;
}

http {
    upstream lumen_app {
        # IP Hash enables sticky sessions, which is useful for Socket.IO if we aren't heavily relying on Redis adapter
        # But we are using Redis Adapter, so round-robin is fine.
        server app1:3000;
        server app2:3000;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://lumen_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Handle Socket.IO specifically if needed
        location /ws/ {
            proxy_pass http://lumen_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
